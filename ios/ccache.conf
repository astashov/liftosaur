# Same settings as react-native/scripts/xcode/ccache.conf, plus a bigger cache —
# the 5GB default evicts too aggressively for RN New-Arch C++ across sim + device.
sloppiness = clang_index_store,file_stat_matches,include_file_ctime,include_file_mtime,ivfsoverlay,pch_defines,modules,system_headers,time_macros
file_clone = true
depend_mode = true
inode_cache = true
max_size = 30G
